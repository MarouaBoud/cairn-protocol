[pytest]
# Pytest configuration for CAIRN SDK

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio configuration
asyncio_mode = auto

# Markers
markers =
    integration: integration tests that require real services (PINATA_JWT, RPC_URL)
    slow: slow running tests (>5 seconds)
    unit: fast unit tests with mocked dependencies

# Output
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Coverage (when using pytest-cov)
# Run with: pytest --cov=sdk --cov-report=html
